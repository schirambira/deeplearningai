<!DOCTYPE html>
<html>
  <head>
    <title>DeepLearningAI</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      *{
        box-sizing: border-box;
      }
      body{
        background-image: url('images/AI_Africa.jpeg');
        background-size: cover;
        background-repeat: no-repeat;
        font-family: Arial;
        font-size: 18px;
        color: darkcyan; 
      }
      div#wrapper{
        background-image: radial-gradient(rgb(187, 230, 225), rgb(193, 249, 145), lightcyan, honeydew, cyan, azure, mintcream);
        margin-top: 1%;
        border : 1px groove teal;
        border-radius: 15px;
        /*----specific----*/
        width: 40%;
        margin-left: 60%;
        padding: 20px;
        min-height: 96vh;
      }
      
      h1, p{
        text-align: center;
        margin: 10px 0 4px 0;
      }
      a{
        margin-top: 2px;
      }

      @media only screen and (min-width : 320px) and (max-width : 480px) {
        /*--- Mobile portrait ---*/
        div#wrapper{
          /*----specific----*/
          width: 100%;
          margin-inline: 0;
          padding: 10px;
          min-height: 90vh;
        }
      }
      @media only screen and (min-width : 480px) and (max-width : 595px) {/*--- Mobile landscape ---*/}
      @media only screen and (min-width : 595px) and (max-width : 690px) {/*--- Small tablet portrait ---*/}
      @media only screen and (min-width : 690px) and (max-width : 800px) {/*--- Tablet portrait ---*/}
      @media only screen and (min-width : 800px) and (max-width : 1024px) {/*--- Small tablet landscape ---*/}
      @media only screen and (min-width : 1024px) and (max-width : 1224px) {/*--- Tablet landscape --- */}
    </style>
    
  </head>

  <body>

    <div id="wrapper">

      <header>
        
      </header>

      <nav>
        
      </nav>

      <div id="maincontent">

        <h1>Deep Leaning Shared Resources</h1>
        <p><a href="https://deeplearningindaba.com/2026/" target="_blank">Deep Learning Indaba 2026</a></p>
        <hr>
        <div id="file-list"></div> 

        <script>

          const repoOwner = 'schirambira';
          const repoName = 'DeepLearningAI';
          const branch = 'main'; // or 'master'
          const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
          
          async function getGithubFiles() {
              try {
                  const response = await fetch(apiUrl);
                  const files = await response.json();
                  const listContainer = document.getElementById('file-list');

                  //first approach
                  files.forEach(file => {
                      // We only want to link to actual files (skip directories)
                      if (file.type === 'file') {

                          const blockedfiles = ['html', 'md', 'rtf'];
                          if (! blockedfiles.includes( getFileExtension(file.name) )) { //if (! blockedfiles.indexOf(fileToCheck) > -1) {  //skip blocked files
                              
                              const link = document.createElement('a');
                              
                              // Link to the raw file or the GitHub view page
                              //link.href = file.html_url; 
                              link.textContent = file.name;
                              link.style.display = 'block'; // Put each link on a new line
                              
    
                              // CRITICAL: This opens the file in a new tab
                              link.href = `viewer.html?file=${file.html_url}`;
                              link.target = '_blank';
                            
                              
                              listContainer.appendChild(link);

                          }
                      }
                  });
                  

                //alternative
                /*
                files.forEach(file => {
                    if (file.type === 'file') {
                        const link = document.createElement('a');
                        
                        // OPTION A: Open the GitHub Page (Best for viewing/starring)
                        link.href = file.html_url; 
                
                        // OPTION B: Open the RAW file (Best for images or direct code)
                        // link.href = file.download_url; 
                
                        link.textContent = file.name;
                        
                        // CRITICAL: This opens the file in a new tab
                        link.target = '_blank'; 
                        
                        // Security best practice when using target="_blank"
                        link.rel = 'noopener noreferrer'; 
                
                        link.style.display = 'block';
                        link.style.margin = '10px 0'; // Adds a little spacing
                        
                        listContainer.appendChild(link);
                    }
                });
                */
                
              } catch (error) {
                  console.error('Error fetching files:', error);
              }
          }

          //get file extension
          function getFileExtension(filename) {
            return filename.split('.').pop();
          }

          //call
          document.addEventListener('DOMContentLoaded', () => {
              getGithubFiles();
          });
          
        </script>
        
      </div>
      
    </div>
    
  </body>
</html>
