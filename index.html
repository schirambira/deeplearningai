<!DOCTYPE html>
<html>

    <title>DeepLearningAI</title>

      div#maincontainer{
        width: 80%;

        min-height: 90vh;

  <body>

    <div id="maincontainer">

      <header>

      <nav>

      <div id="maincontent">

        <h1>Repository Files</h1>
        <hr>
        <div id="file-list"></div> <script src="script.js"></script>

        <script>

          const repoOwner = 'schirambira';
          const repoName = 'DeepLearningAI';
          const branch = 'main'; // or 'master'
          const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
          
          async function getGithubFiles() {
              try {
                  const response = await fetch(apiUrl);
                  const files = await response.json();
                  const listContainer = document.getElementById('file-list');

                  //first approach
                  files.forEach(file => {
                      // We only want to link to actual files (skip directories)
                      if (file.type === 'file') {
                          const link = document.createElement('a');
                          
                          // Link to the raw file or the GitHub view page
                          link.href = file.html_url; 
                          link.textContent = file.name;
                          link.style.display = 'block'; // Put each link on a new line
                          link.onclick = "return false; alert(0);";
                          
                          listContainer.appendChild(link);
                      }
                  });
                  

                //alternative
                /*
                files.forEach(file => {
                    if (file.type === 'file') {
                        const link = document.createElement('a');
                        
                        // OPTION A: Open the GitHub Page (Best for viewing/starring)
                        link.href = file.html_url; 
                
                        // OPTION B: Open the RAW file (Best for images or direct code)
                        // link.href = file.download_url; 
                
                        link.textContent = file.name;
                        
                        // CRITICAL: This opens the file in a new tab
                        link.target = '_blank'; 
                        
                        // Security best practice when using target="_blank"
                        link.rel = 'noopener noreferrer'; 
                
                        link.style.display = 'block';
                        link.style.margin = '10px 0'; // Adds a little spacing
                        
                        listContainer.appendChild(link);
                    }
                });
                */
                
              } catch (error) {
                  console.error('Error fetching files:', error);
              }
          }

          //call
          document.addEventListener('DOMContentLoaded', () => {
              getGithubFiles();
          });
          
        </script>
        
      </div>
      
    </div>
    
  </body>
</html>
